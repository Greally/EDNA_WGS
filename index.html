  <meta name="description" content="Prepare for your whole genome sequencing visit with the NYCRD genetics team.">
  <meta name="mobile-web-app-capable" content="yes">

  <title>Edna – WGS Pre-Test Counselling</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --navy:   #1a3a5c;
      --blue:   #2d4a8a;
      --teal:   #3cb8e0;
      --orange: #f97316;
      --cream:  #fef9f0;
      --white:  #ffffff;
      --pale-blue: #e8f4fb;
      --pale-q:    #f3e5f5;
      --pale-ok:   #e8f5e9;
      --pale-warn: #fff3e0;
      --text:   #1a3a5c;
      --mid:    #4a6080;
      --soft:   #8a9bb0;
    }
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html,body { width:100%; height:100%; overflow:hidden; background:var(--navy); }
    body { font-family:'Quicksand',sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; min-height:-webkit-fill-available; }

    @media (display-mode:standalone){
      body { background:var(--cream); }
      .phone { width:100vw; height:100vh; height:-webkit-fill-available; border-radius:0; box-shadow:none; }
      .notch { display:none; }
      .status-bar { padding-top:env(safe-area-inset-top,44px); height:calc(env(safe-area-inset-top,44px)+28px); }
      .response-area { padding-bottom:calc(20px + env(safe-area-inset-bottom,20px)); }
    }

    /* Phone shell */
    .phone { width:390px; height:844px; background:var(--cream); border-radius:54px;
      box-shadow:0 0 0 2px #333,0 0 0 6px #555,0 0 60px rgba(0,0,0,.8),inset 0 0 0 1px rgba(255,255,255,.1);
      position:relative; overflow:hidden; display:flex; flex-direction:column; }
    .notch { position:absolute; top:0; left:50%; transform:translateX(-50%); width:126px; height:34px; background:#111; border-radius:0 0 20px 20px; z-index:100; }

    .status-bar { height:50px; display:flex; align-items:flex-end; justify-content:space-between; padding:0 28px 6px; flex-shrink:0; z-index:10; }
    .status-time { font-family:'Nunito',sans-serif; font-size:15px; font-weight:800; color:var(--text); }
    .status-icons svg { width:16px; height:16px; fill:var(--text); }
    .status-icons { display:flex; gap:6px; align-items:center; }

    /* Header */
    .app-header { background:linear-gradient(180deg,#2d4a8a 0%,#1a3a5c 100%); padding:10px 24px 14px; text-align:center; flex-shrink:0; position:relative; }
    .app-header::after { content:''; position:absolute; bottom:0; left:0; right:0; height:20px; background:var(--cream); border-radius:20px 20px 0 0; }
    .app-title { font-family:'Nunito',sans-serif; font-size:12px; font-weight:700; color:rgba(255,255,255,.8); letter-spacing:.1em; text-transform:uppercase; }
    .app-subtitle { font-family:'Nunito',sans-serif; font-size:10px; color:rgba(255,255,255,.55); margin-top:2px; }
    .progress-wrap { margin-top:8px; height:5px; background:rgba(255,255,255,.15); border-radius:4px; overflow:hidden; }
    .progress-fill { height:100%; background:var(--orange); border-radius:4px; transition:width .6s ease; width:5%; }

    /* Section badge */
    .section-badge { display:inline-block; font-family:'Nunito',sans-serif; font-size:10px; font-weight:800; padding:3px 10px; border-radius:20px; margin:6px auto 2px; letter-spacing:.06em; text-transform:uppercase; }
    .badge-info  { background:var(--pale-blue); color:var(--blue); }
    .badge-quiz  { background:var(--pale-q); color:#6a0dad; }
    .badge-good  { background:var(--pale-ok); color:#1b5e20; }
    .badge-warn  { background:var(--pale-warn); color:#7a3800; }

    /* Chat */
    .chat-area { flex:1; overflow-y:auto; padding:12px 18px 8px; display:flex; flex-direction:column; gap:14px; scroll-behavior:smooth; -webkit-overflow-scrolling:touch; }
    .chat-area::-webkit-scrollbar { display:none; }

    /* Owl hero */
    .owl-scene { display:flex; flex-direction:column; align-items:center; padding:6px 0 2px; animation:float 4s ease-in-out infinite; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }

    /* Bubbles */
    .bubble-row { display:flex; gap:9px; align-items:flex-end; animation:slideUp .35s ease forwards; opacity:0; }
    @keyframes slideUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
    .bubble-row.edna-row { flex-direction:row; }
    .bubble-row.patient-row { flex-direction:row-reverse; }

    .avatar { width:34px; height:34px; border-radius:50%; flex-shrink:0; overflow:hidden; background:#2d4a8a; display:flex; align-items:center; justify-content:center; }

    .bubble { max-width:265px; padding:11px 15px; border-radius:18px; font-size:15px; line-height:1.55; font-weight:600; color:var(--text); position:relative; }
    .edna-bubble { background:var(--white); border-bottom-left-radius:4px; box-shadow:0 2px 10px rgba(26,58,92,.1); }
    .patient-bubble { background:linear-gradient(135deg,#2d4a8a,#1a3a5c); color:white; border-bottom-right-radius:4px; box-shadow:0 2px 10px rgba(45,74,138,.25); }
    .quiz-bubble { background:var(--pale-q); border-bottom-left-radius:4px; box-shadow:0 2px 10px rgba(26,58,92,.1); }

    /* Typing */
    .typing-row { display:flex; gap:9px; align-items:flex-end; animation:slideUp .35s ease forwards; opacity:0; }
    .typing-dots { background:var(--white); border-radius:18px; border-bottom-left-radius:4px; padding:13px 16px; display:flex; gap:5px; align-items:center; box-shadow:0 2px 10px rgba(26,58,92,.1); }
    .dot { width:7px; height:7px; background:#bbc8d8; border-radius:50%; animation:bounce 1.2s ease-in-out infinite; }
    .dot:nth-child(2){animation-delay:.2s}
    .dot:nth-child(3){animation-delay:.4s}
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px);background:var(--teal)} }

    /* Response area */
    .response-area { padding:10px 18px 26px; display:flex; flex-direction:column; gap:9px; flex-shrink:0; background:var(--cream); }

    .resp-btn { width:100%; padding:13px 18px; border:2px solid transparent; border-radius:14px; font-family:'Quicksand',sans-serif; font-size:14px; font-weight:700; cursor:pointer; transition:all .2s; text-align:left; display:flex; align-items:center; gap:11px; line-height:1.35; }
    .resp-btn.primary { background:linear-gradient(135deg,#2d4a8a,#1a3a5c); color:white; box-shadow:0 4px 14px rgba(45,74,138,.25); }
    .resp-btn.primary:active { transform:scale(.97); }
    .resp-btn.secondary { background:var(--white); color:var(--text); border-color:#d8e4f0; box-shadow:0 2px 8px rgba(26,58,92,.06); }
    .resp-btn.secondary:active { background:#f0f5fb; transform:scale(.97); }
    .resp-btn.quiz-opt { background:var(--white); color:var(--text); border-color:#ce93d8; box-shadow:0 2px 8px rgba(106,13,173,.08); }
    .resp-btn.quiz-opt:active { background:var(--pale-q); transform:scale(.97); }
    .btn-icon { font-size:20px; flex-shrink:0; }
    .btn-text .btn-title { font-weight:700; font-size:14px; }
    .btn-text .btn-sub { font-size:11px; font-weight:500; opacity:.7; margin-top:1px; }

    /* Quiz feedback banners */
    .feedback-banner { border-radius:12px; padding:12px 15px; font-size:14px; font-weight:600; line-height:1.45; animation:slideUp .35s ease forwards; opacity:0; }
    .feedback-correct { background:var(--pale-ok); color:#1b5e20; border:1.5px solid #a5d6a7; }
    .feedback-wrong   { background:var(--pale-warn); color:#7a3800; border:1.5px solid #ffcc80; }

    /* Offline toast */
    #offlineToast { display:none; position:absolute; top:58px; left:50%; transform:translateX(-50%); background:var(--orange); color:white; padding:7px 16px; border-radius:18px; font-size:12px; font-weight:700; z-index:300; white-space:nowrap; box-shadow:0 4px 12px rgba(0,0,0,.2); }

    /* Install banner */
    #installBanner { display:none; position:absolute; bottom:0; left:0; right:0; background:linear-gradient(135deg,#2d4a8a,#1a3a5c); color:white; padding:12px 18px; align-items:center; gap:10px; z-index:200; font-family:'Quicksand',sans-serif; }
    #installBanner .install-text { flex:1; font-size:12px; font-weight:600; line-height:1.4; }
    #installBanner .install-btn { background:var(--orange); color:white; border:none; border-radius:9px; padding:7px 14px; font-weight:800; font-size:12px; cursor:pointer; font-family:'Quicksand',sans-serif; }
    #installBanner .install-close { background:none; border:none; color:rgba(255,255,255,.6); font-size:18px; cursor:pointer; line-height:1; }

    @keyframes blink { 0%,93%,100%{transform:scaleY(1)} 95%{transform:scaleY(.05)} }
    #owl-eyes { animation:blink 3.8s ease-in-out infinite; transform-origin:center 70px; }
    @keyframes wingFlap { 0%,85%,100%{transform:rotate(0deg)} 90%{transform:rotate(-16deg)} 95%{transform:rotate(3deg)} }
    #owl-wl { transform-origin:65px 95px; animation:wingFlap 4.5s ease-in-out infinite; }
    #owl-wr { transform-origin:65px 95px; animation:wingFlap 4.5s ease-in-out 0.18s infinite; transform:scaleX(-1); }
  </style>
</head>
<body>
<div class="phone" id="phone">
  <div class="notch"></div>
  <div id="offlineToast">📵 Offline — app still works!</div>

  <div class="status-bar">
    <span class="status-time" id="statusTime">9:41</span>
    <div class="status-icons">
      <svg viewBox="0 0 24 24"><path d="M5 12.55a11 11 0 0114.08 0M1.42 9a16 16 0 0121.16 0M8.53 16.11a6 6 0 016.95 0M12 20h.01" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
      <svg viewBox="0 0 24 24"><rect x="2" y="7" width="18" height="11" rx="2" stroke="currentColor" stroke-width="2" fill="none"/><path d="M22 11v3" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/></svg>
    </div>
  </div>

  <div class="app-header">
    <div class="app-title">WGS Pre-Test Counselling</div>
    <div class="app-subtitle">A New York Center for Rare Diseases resource</div>
    <div class="progress-wrap"><div class="progress-fill" id="progressBar"></div></div>
  </div>

  <div class="chat-area" id="chatArea">
    <!-- Owl hero -->
    <div class="owl-scene">
      <svg width="120" height="135" viewBox="0 0 130 155" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="65" cy="148" rx="52" ry="7" fill="#1a2744" opacity=".25"/>
        <!-- Body -->
        <ellipse cx="65" cy="100" rx="38" ry="42" fill="#f97316"/>

        <!-- Wings -->
        <g id="owl-wl"><ellipse cx="33" cy="105" rx="14" ry="26" fill="#d96010" transform="rotate(-8 33 105)"/></g>
        <g id="owl-wr" style="transform-origin:65px 105px;transform:scaleX(-1)"><ellipse cx="33" cy="105" rx="14" ry="26" fill="#d96010" transform="rotate(-8 33 105)"/></g>
        <!-- Ear tufts -->
        <polygon points="45,62 40,44 52,58" fill="#f97316"/>
        <polygon points="85,62 90,44 78,58" fill="#f97316"/>

        <circle cx="65" cy="72" r="32" fill="#f97316"/>

        <g id="owl-eyes">
          <circle cx="53" cy="70" r="12" fill="#1a3a5c"/>
          <circle cx="77" cy="70" r="12" fill="#1a3a5c"/>
          <circle cx="53" cy="70" r="9"  fill="#3cb8e0"/>
          <circle cx="77" cy="70" r="9"  fill="#3cb8e0"/>
          <circle cx="53" cy="70" r="5"  fill="#0d1f35"/>
          <circle cx="77" cy="70" r="5"  fill="#0d1f35"/>
          <circle cx="56" cy="67" r="2.5" fill="white" opacity=".9"/>
          <circle cx="80" cy="67" r="2.5" fill="white" opacity=".9"/>
        </g>
        <!-- Beak -->
        <polygon points="65,80 59,88 71,88" fill="#e07010"/>
        <!-- Chest feathers -->
        <ellipse cx="55" cy="112" rx="8" ry="5" fill="#ffd4a0" opacity=".6" transform="rotate(-15 55 112)"/>
        <ellipse cx="65" cy="116" rx="8" ry="5" fill="#ffd4a0" opacity=".6"/>
        <ellipse cx="75" cy="112" rx="8" ry="5" fill="#ffd4a0" opacity=".6" transform="rotate(15 75 112)"/>
        <!-- Feet -->
        <path d="M52 138 Q50 132 48 130 M52 138 Q52 132 50 129 M52 138 Q54 132 56 130" stroke="#e07010" stroke-width="2.5" stroke-linecap="round" fill="none"/>
        <path d="M78 138 Q76 132 74 130 M78 138 Q78 132 76 129 M78 138 Q80 132 82 130" stroke="#e07010" stroke-width="2.5" stroke-linecap="round" fill="none"/>
        <!-- Grad cap -->
        <rect x="44" y="42" width="42" height="5" rx="2" fill="#1a3a5c" opacity=".9"/>
        <polygon points="65,32 44,44 86,44" fill="#1a3a5c" opacity=".9"/>
        <line x1="86" y1="44" x2="92" y2="54" stroke="#f97316" stroke-width="2.5" stroke-linecap="round"/>
        <circle cx="92" cy="56" r="3.5" fill="#f97316"/>
      </svg>
    </div>
  </div>

  <div class="response-area" id="responseArea"></div>

  <div id="installBanner">
    <span style="font-size:22px">🧬</span>
    <div class="install-text">Add to your Home Screen for the best experience</div>
    <button class="install-btn" id="installBtn">Install</button>
    <button class="install-close" id="installClose">×</button>
  </div>
</div>

<script>
// ── Clock ──────────────────────────────────────────────────────
function updateClock(){
  const n=new Date(), h=n.getHours()%12||12, m=String(n.getMinutes()).padStart(2,'0');
  document.getElementById('statusTime').textContent=h+':'+m;
}
updateClock(); setInterval(updateClock,10000);

// ── PWA ────────────────────────────────────────────────────────
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js')
    .then(r=>console.log('SW:',r.scope)).catch(e=>console.warn(e)));
}
const toast=document.getElementById('offlineToast');
function showToast(msg,dur=3000){toast.textContent=msg;toast.style.display='block';setTimeout(()=>toast.style.display='none',dur);}
window.addEventListener('offline',()=>showToast('📵 Offline — app still works!',4000));
window.addEventListener('online', ()=>showToast('✅ Back online!',2500));
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;document.getElementById('installBanner').style.display='flex';});
document.getElementById('installBtn').onclick=()=>{if(deferredPrompt){deferredPrompt.prompt();deferredPrompt.userChoice.then(()=>{deferredPrompt=null;document.getElementById('installBanner').style.display='none';});}};
document.getElementById('installClose').onclick=()=>document.getElementById('installBanner').style.display='none';

// ── Personalisation ────────────────────────────────────────────
let userRole = 'patient'; // 'patient' or 'parent'
function personalise(text){
  if(userRole==='patient'){
    return text
      .replace(/\[your \/ your child's\]/g,'your')
      .replace(/\[your \/ your child's\] medical condition/g,'your medical condition')
      .replace(/\[your \/ your child's\] primary medical condition/g,'your primary medical condition')
      .replace(/\[you \/ your family\]/g,'you');
  } else {
    return text
      .replace(/\[your \/ your child's\]/g,"your child's")
      .replace(/\[your \/ your child's\] medical condition/g,"your child's medical condition")
      .replace(/\[your \/ your child's\] primary medical condition/g,"your child's primary medical condition")
      .replace(/\[you \/ your family\]/g,'your family');
  }
}

// ── Conversation data ──────────────────────────────────────────
// steps[id] = { messages: [...], options: [...], progress, isQuiz }
const steps = {

  intro: {
    progress: 5,
    messages: [
      "Hi there! I'm Edna. 🦉",
      "I'm here to help prepare you for your upcoming visit with the genetics team for whole genome sequencing (WGS).",
      "This session is short and to the point. I'll explain what WGS is, what the results might mean, and what your choices are. There will be a couple of quick questions to check we're on the same page.",
      "First — are you the patient, or a parent of the patient?"
    ],
    options: [
      {icon:'🧑‍⚕️', title:"I am the patient",      sub:"", value:'patient', style:'primary',  next:'s1_wgs_what'},
      {icon:'👪',    title:"I am a parent",           sub:"of the patient", value:'parent',  style:'primary',  next:'s1_wgs_what'},
    ]
  },

  s1_wgs_what: {
    progress: 12, badge:'info', badgeLabel:'What is WGS?',
    messages: [
      "Whole genome sequencing — or WGS — is a test that reads every single gene in a person's DNA. There are roughly 20,000 genes in total.",
      "Think of your genes as a very long instruction manual for your body. WGS lets us read the entire manual — looking for any typo in the text that might be causing [your / your child's] medical condition.",
      "To get the DNA we need, we take either a small blood sample or a gentle cheek swab — whichever works best for you."
    ],
    options:[{icon:'👉', title:"Got it — what's next?", value:'next', style:'primary', next:'s2_parents'}]
  },

  s2_parents: {
    progress: 18, badge:'info', badgeLabel:'Testing the family',
    messages: [
      "Ideally, we also test both biological parents of the patient.",
      "Why? Because comparing the parents' DNA to each other — and to the patient's — helps the laboratory spot the damaged gene causing the medical problem. It's like having two reference copies to check the draft against.",
      "Parents also provide either a blood sample or a cheek swab — the same choice as for the patient."
    ],
    options:[{icon:'👉', title:"Understood — continue", value:'next', style:'primary', next:'quiz1'}]
  },

  quiz1: {
    progress: 20, isQuiz:true, badge:'quiz', badgeLabel:'Quick check ✏️',
    messages:["Why do we ideally test both parents as well as the patient?"],
    options:[
      {icon:'🔬', title:"To compare their DNA and find the damaged gene more easily", value:'correct', style:'quiz-opt', next:'quiz1_correct'},
      {icon:'❌', title:"Because parents always have the same condition",               value:'wrong1',  style:'quiz-opt', next:'quiz1_wrong'},
      {icon:'❌', title:"To check that the parents are healthy",                        value:'wrong2',  style:'quiz-opt', next:'quiz1_wrong'},
    ]
  },

  quiz1_correct: {
    progress: 20, badge:'good', badgeLabel:'Correct! ✅',
    messages:[
      "Exactly right! Comparing the parents' DNA gives the laboratory a reference point that makes it much easier to find the damaged gene.",
      "Let's talk about what the results might look like."
    ],
    options:[{icon:'👉', title:"Continue", value:'next', style:'primary', next:'s3_results'}]
  },

  quiz1_wrong: {
    progress: 20, badge:'warn', badgeLabel:'Not quite…',
    messages:[
      "Not quite. We test both parents because comparing their DNA to each other — and to the patient's — makes it much easier to pinpoint the damaged gene causing the medical condition.",
      "No worries — let's move on to what the results might look like."
    ],
    options:[{icon:'👉', title:"Continue", value:'next', style:'primary', next:'s3_results'}]
  },

  s3_results: {
    progress: 28, badge:'info', badgeLabel:'Types of results',
    messages:[
      "WGS results come back in one of three ways:",
      "✅ POSITIVE — we found a damaged gene that is very likely causing [your / your child's] medical condition. This is the result the team is hoping for.",
      "🔵 NEGATIVE — no damaged gene likely to explain [your / your child's] medical condition could be found. This does not mean the condition isn't genetic — just that today's technology hasn't found it yet.",
      "🔶 UNCERTAIN — sometimes we find a 'Variant of Uncertain Significance', or VUS. This just means we found something slightly unusual, but we don't yet know whether it matters.",
      "A VUS is mainly flagged so that the medical team and laboratory can keep an eye on it — in most cases it turns out to be nothing to worry about. It is not a diagnosis.",
      "One more thing: at present, only a minority of patients get a positive result. A negative result is common and does not mean the testing process was a failure."
    ],
    options:[{icon:'👉', title:"Understood — continue", value:'next', style:'primary', next:'quiz2'}]
  },

  quiz2: {
    progress: 32, isQuiz:true, badge:'quiz', badgeLabel:'Quick check ✏️',
    messages:["Which of these best describes a VUS?"],
    options:[
      {icon:'🔬', title:"A slight difference in DNA that we're monitoring — not a diagnosis", value:'correct', style:'quiz-opt', next:'quiz2_correct'},
      {icon:'❌', title:"A confirmed diagnosis of a genetic disease",                          value:'wrong1',  style:'quiz-opt', next:'quiz2_wrong'},
      {icon:'❌', title:"Proof that the test found nothing",                                   value:'wrong2',  style:'quiz-opt', next:'quiz2_wrong'},
    ]
  },

  quiz2_correct: {
    progress: 32, badge:'good', badgeLabel:'Correct! ✅',
    messages:["Exactly. A VUS is something slightly unusual that we watch — not a diagnosis, and usually nothing to worry about."],
    options:[{icon:'👉', title:"Continue", value:'next', style:'primary', next:'s4_benefits'}]
  },

  quiz2_wrong: {
    progress: 32, badge:'warn', badgeLabel:'Not quite…',
    messages:["Not quite. A VUS is a slight difference in DNA that we flag so the team can keep an eye on it — but it is not a diagnosis, and in most cases it turns out to be nothing to worry about."],
    options:[{icon:'👉', title:"Continue", value:'next', style:'primary', next:'s4_benefits'}]
  },

  s4_benefits: {
    progress: 42, badge:'info', badgeLabel:'Benefits of a positive result',
    messages:[
      "If the test comes back positive — meaning the damaged gene is found — there are several important benefits.",
      "💊 Better care: Knowing the genetic cause can guide more targeted treatment. In some cases it may open access to experimental therapies only available to patients with a confirmed genetic diagnosis.",
      "👪 Family planning: The parents will better understand whether there is a chance of having another child with the same condition. A genetic counsellor can walk through what this means.",
      "🌳 Wider family: A confirmed diagnosis can also explain why other relatives — even distant cousins — may be affected by the same condition. It can bring years of uncertainty to an end for many people at once."
    ],
    options:[{icon:'👉', title:"Continue", value:'next', style:'primary', next:'s5_risks'}]
  },

  s5_risks: {
    progress: 52, badge:'info', badgeLabel:'Legal considerations',
    messages:[
      "It is also important to know about one legal risk before testing.",
      "🛡️ In the United States, a federal law called GINA — the Genetic Information Non-discrimination Act — protects patients against discrimination based on genetic test results in the workplace and when getting health insurance.",
      "⚠️ However, GINA does not cover every type of insurance. Life insurance, disability insurance, and long-term care insurance are not protected. Insurers for those products may legally ask about genetic test results.",
      "This is something to be aware of — but it is ultimately your decision whether to proceed. Many families decide that the potential benefits outweigh this risk."
    ],
    options:[{icon:'👉', title:"Understood — continue", value:'next', style:'primary', next:'quiz3'}]
  },

  quiz3: {
    progress: 56, isQuiz:true, badge:'quiz', badgeLabel:'Quick check ✏️',
    messages:["Which insurance type is NOT protected by GINA from using your genetic results?"],
    options:[
      {icon:'🔬', title:"Life, disability, and long-term care insurance", value:'correct', style:'quiz-opt', next:'quiz3_correct'},
      {icon:'❌', title:"Health insurance",                                value:'wrong1',  style:'quiz-opt', next:'quiz3_wrong'},
      {icon:'❌', title:"Workplace employment",                            value:'wrong2',  style:'quiz-opt', next:'quiz3_wrong'},
    ]
  },

  quiz3_correct: {
    progress: 56, badge:'good', badgeLabel:'Correct! ✅',
    messages:["Correct. Health insurance and employment are protected by GINA — but life, disability, and long-term care insurance are not."],
    options:[{icon:'👉', title:"Continue", value:'next', style:'primary', next:'s6_secondary'}]
  },

  quiz3_wrong: {
    progress: 56, badge:'warn', badgeLabel:'Not quite…',
    messages:["Not quite. GINA protects you in the workplace and for health insurance — but it does not cover life insurance, disability insurance, or long-term care insurance."],
    options:[{icon:'👉', title:"Continue", value:'next', style:'primary', next:'s6_secondary'}]
  },

  s6_secondary: {
    progress: 66, badge:'info', badgeLabel:'Secondary findings',
    messages:[
      "Because WGS reads every gene, there is an option to look at something beyond [your / your child's] primary medical condition.",
      "🧬 This is called looking for secondary findings — a defined list of tens of genes, mostly linked to heart and blood vessel diseases, cancer risk, and metabolic conditions. Finding a problem in these genes has a practical value: there are proven ways to manage these risks and improve health outcomes.",
      "Secondary findings can be reported for the patient, and/or either or both parents — it is a separate choice for each person providing a sample.",
      "Only a small number of people — no more than a few percent — actually receive a positive secondary finding. For most people tested, nothing extra is found.",
      "The choice is entirely yours. If you would like secondary findings reported, simply let the medical team know when they ask. It is also perfectly fine to focus on [your / your child's] primary medical condition first — there is no pressure either way."
    ],
    options:[{icon:'👉', title:"Continue to final check", value:'next', style:'primary', next:'quiz4'}]
  },

  quiz4: {
    progress: 80, isQuiz:true, badge:'quiz', badgeLabel:'Last check ✏️',
    messages:["Which of these best describes secondary findings?"],
    options:[
      {icon:'🔬', title:"An optional look at other genes that could affect long-term health", value:'correct', style:'quiz-opt', next:'quiz4_correct'},
      {icon:'❌', title:"The main result — whether the condition was found",                   value:'wrong1',  style:'quiz-opt', next:'quiz4_wrong'},
      {icon:'❌', title:"A second opinion from another doctor",                                value:'wrong2',  style:'quiz-opt', next:'quiz4_wrong'},
    ]
  },

  quiz4_correct: {
    progress: 80, badge:'good', badgeLabel:'Correct! ✅',
    messages:["Exactly right! Secondary findings are an optional extra — a chance to learn about other health risks while the sequencing is already being done."],
    options:[{icon:'👉', title:"Almost done!", value:'next', style:'primary', next:'s7_closing'}]
  },

  quiz4_wrong: {
    progress: 80, badge:'warn', badgeLabel:'Not quite…',
    messages:["Not quite. Secondary findings are an optional look at a separate set of genes — not related to the main condition — where knowing about a risk can help manage health outcomes."],
    options:[{icon:'👉', title:"Almost done!", value:'next', style:'primary', next:'s7_closing'}]
  },

  s7_closing: {
    progress: 100, badge:'info', badgeLabel:'All done 🎉',
    messages:[
      "That covers everything I wanted to share with you today.",
      "The purpose of this session was to prepare you — and your family — for your upcoming visit with the genetics team, so that the pre-test genetic counselling conversation is as useful as possible.",
      "When you meet the team, they will go over everything in more detail and answer any questions you have. You won't need to make any decisions today.",
      "Edna hopes that [you / your family] gets the answers you are looking for. Good luck with the appointment! 💙"
    ],
    options:[
      {icon:'🙏', title:"Thank you, Edna!",  value:'done',    style:'primary',   next:'end'},
    ]
  },

  end: {
    progress: 100,
    messages:["You're very welcome. Take care! 🦉✨"],
    options:[
      {icon:'🔄', title:"Start over", value:'restart', style:'secondary', next:'intro'},
    ]
  }
};

// ── Engine ─────────────────────────────────────────────────────
const chatArea    = document.getElementById('chatArea');
const respArea    = document.getElementById('responseArea');
const progressBar = document.getElementById('progressBar');

function owlAvatar(){
  return `<div class="avatar">
    <svg viewBox="0 0 36 36" width="36" height="36">
      <circle cx="18" cy="18" r="18" fill="#2d4a8a"/>
      <ellipse cx="18" cy="21" rx="10" ry="11" fill="#f97316"/>
      <circle cx="13" cy="18" r="3.5" fill="#1a3a5c"/>
      <circle cx="23" cy="18" r="3.5" fill="#1a3a5c"/>
      <circle cx="13" cy="18" r="2"   fill="#3cb8e0"/>
      <circle cx="23" cy="18" r="2"   fill="#3cb8e0"/>
      <circle cx="14" cy="17" r="1.2" fill="white"/>
      <circle cx="24" cy="17" r="1.2" fill="white"/>
      <polygon points="18,22 15,26 21,26" fill="#e07010"/>
    </svg></div>`;
}

function scrollBottom(){
  setTimeout(()=>{ chatArea.scrollTop=chatArea.scrollHeight; },60);
}

function showTyping(callback, delay){
  const row=document.createElement('div');
  row.className='typing-row';
  row.innerHTML=`${owlAvatar()}<div class="typing-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  chatArea.appendChild(row);
  scrollBottom();
  setTimeout(()=>{ row.remove(); callback(); }, delay);
}

function addBubble(type, text, extraClass=''){
  const row=document.createElement('div');
  const isEdna=(type==='edna'||type==='quiz');
  row.className=`bubble-row ${isEdna?'edna-row':'patient-row'}`;
  const bubClass= type==='quiz' ? 'quiz-bubble' : (isEdna ? 'edna-bubble' : 'patient-bubble');
  row.innerHTML=`${isEdna ? owlAvatar() : ''}
    <div class="bubble ${bubClass} ${extraClass}">${personalise(text).replace(/\n/g,'<br>')}</div>`;
  chatArea.appendChild(row);
  scrollBottom();
}

function addBadge(badgeClass, label){
  const d=document.createElement('div');
  d.style.textAlign='center';
  d.style.animation='slideUp .3s ease forwards';
  d.style.opacity='0';
  d.innerHTML=`<span class="section-badge ${badgeClass}">${label}</span>`;
  chatArea.appendChild(d);
  scrollBottom();
}

function showOptions(step){
  respArea.innerHTML='';
  step.options.forEach((opt,i)=>{
    const btn=document.createElement('button');
    btn.className=`resp-btn ${opt.style}`;
    btn.style.animationDelay=`${i*0.07}s`;
    btn.style.animation='slideUp .32s ease forwards';
    btn.style.opacity='0';
    btn.innerHTML=`<span class="btn-icon">${opt.icon||'👉'}</span>
      <div class="btn-text"><div class="btn-title">${opt.title}</div>${opt.sub?`<div class="btn-sub">${opt.sub}</div>`:''}</div>`;
    btn.onclick=()=>handleChoice(opt, step);
    respArea.appendChild(btn);
  });
}

function handleChoice(opt, step){
  respArea.querySelectorAll('.resp-btn').forEach(b=>{b.disabled=true;b.style.opacity='.4';});
  addBubble('patient', opt.title);
  // If intro step, capture role
  if(opt.value==='patient'||opt.value==='parent') userRole=opt.value;
  if(opt.next) setTimeout(()=>loadStep(opt.next), 450);
}

async function loadStep(stepId){
  const step=steps[stepId];
  if(!step) return;

  progressBar.style.width=(step.progress||5)+'%';
  respArea.innerHTML='';

  // Badge
  if(step.badge && step.badgeLabel){
    const cls={info:'badge-info',quiz:'badge-quiz',good:'badge-good',warn:'badge-warn'}[step.badge]||'badge-info';
    addBadge(cls, step.badgeLabel);
  }

  // Messages
  for(let i=0;i<step.messages.length;i++){
    await new Promise(resolve=>{
      const msg=step.messages[i];
      const delay=600 + Math.min(msg.length*7, 1800);
      showTyping(()=>{ addBubble(step.isQuiz?'quiz':'edna', msg); resolve(); }, delay);
    });
  }

  showOptions(step);
}

// Start
loadStep('intro');
</script>
</body>
</html>
